# ============================================================
# Experiment 1: VLM Preference Quality
# ============================================================
# Benchmarks InternVL-U against human annotators.
# Reports Cohen's kappa and ablates scoring strategies.

defaults:
  - base

experiment:
  name: "exp1_vlm_agreement"
  description: "VLM vs Human preference agreement benchmark"

data:
  num_pairs: 500
  output_dir: "data/exp1_vlm_agreement"

scoring:
  # Run all three strategies for ablation
  ablation_strategies: ["holistic", "multi_aspect", "cot"]

eval:
  metrics: ["cohens_kappa", "agreement_rate", "correlation"]
  # Path to human annotations (must be collected separately)
  human_annotations_file: "data/human_annotations.jsonl"
  eval_output_dir: "outputs/exp1"
