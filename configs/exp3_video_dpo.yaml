# ============================================================
# Experiment 3: Video DPO on Wan2.1 (Main Result)
# ============================================================
# LoRA-DPO on Wan2.1-1.3B with 5K VLM preference pairs.
# Baselines: base Wan2.1, SFT-only, random preference.

defaults:
  - base

experiment:
  name: "exp3_video_dpo"
  description: "Video DPO on Wan2.1 — the main result"

data:
  num_pairs: 5000
  output_dir: "data/exp3_video_pairs"

training:
  max_steps: 2000
  wandb_run_name: "exp3-wan21-video-dpo"

  # Ablations to run
  ablations:
    beta: [0.01, 0.05, 0.1, 0.2, 0.5]
    lora_rank: [4, 8, 16, 32, 64]
    num_pairs: [500, 1000, 2000, 5000]

eval:
  metrics: ["fvd", "clip_score", "vbench", "human_preference"]
  eval_output_dir: "outputs/exp3"
